<!doctype html> 
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TutorBlob - Captura</title>
  <style>
    :root {
      --ink-900: #0d1b2e;
      --lav-200: #d9ccff;
      --lav-500: #8f6ee8;
      --mint-300: #8ce1c3;
      --mint-500: #26b586;
      --amber-300: #ffd480;
      --amber-500: #f5a623;
      --paper: #f4f8fc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--paper);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      width: min(100vw, 1200px);
      height: min(100vh, 720px);
      display: grid;
      place-items: center;
    }

    .blob {
      --size: min(54vw, 430px);
      width: var(--size);
      height: var(--size);
      position: relative;
      border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
      background: radial-gradient(circle at 35% 30%, var(--lav-200) 0%, var(--lav-500) 70%);
      box-shadow:
        inset -22px -30px 56px rgba(0,0,0,.10),
        inset 22px 30px 64px rgba(255,255,255,.48),
        0 34px 90px rgba(34, 29, 62, .18);
      animation: blob-breathe 5s ease-in-out infinite;
    }

    .eye {
      position: absolute;
      top: 44%;
      width: 10%;
      height: 14%;
      background: var(--ink-900);
      border-radius: 50%;
      animation: blink 4.2s ease-in-out infinite;
    }

    .eye.left { left: 30%; }
    .eye.right { right: 30%; }

    .mouth {
      position: absolute;
      top: 61%;
      left: 40%;
      width: 20%;
      height: 10%;
      border-bottom: max(6px, calc(var(--size) * .014)) solid var(--ink-900);
      border-radius: 0 0 40% 40% / 0 0 90% 90%;
      opacity: .7;
    }

    .cheek {
      position: absolute;
      top: 57%;
      width: 12%;
      height: 8%;
      background: rgba(216,90,71,.3);
      border-radius: 50%;
      filter: blur(7px);
    }

    .cheek.left { left: 18%; }
    .cheek.right { right: 18%; }

    .shadow {
      width: min(38vw, 310px);
      height: 34px;
      margin: 36px auto 0;
      border-radius: 50%;
      background: rgba(13, 27, 46, .12);
      filter: blur(8px);
    }

    .controls {
      position: fixed;
      left: 24px;
      bottom: 24px;
      display: flex;
      gap: 8px;
      padding: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(13, 27, 46, .08);
      backdrop-filter: blur(10px);
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 9px 13px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      color: var(--ink-900);
      background: white;
      box-shadow: 0 2px 8px rgba(13, 27, 46, .08);
    }

    button.active {
      background: var(--ink-900);
      color: white;
    }

    body.transparent { background: transparent; }
    body.transparent .shadow { display: none; }

    @keyframes blink {
      0%, 92%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(.12); }
    }

    @keyframes blob-breathe {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-9px) scale(1.025); }
    }

    @media print {
      .controls { display: none; }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="TutorBlob para captura">
    <div>
      <div class="blob" id="blob">
        <span class="eye left"></span>
        <span class="eye right"></span>
        <span class="mouth"></span>
        <span class="cheek left"></span>
        <span class="cheek right"></span>
      </div>
      <div class="shadow"></div>
    </div>
  </main>

  <div class="controls" aria-label="Controles de color">
    <button type="button" data-tone="lav" class="active">Lavanda</button>
    <button type="button" data-tone="mint">Menta</button>
    <button type="button" data-tone="amber">Ambar</button>
    <button type="button" data-tone="transparent">Fondo limpio</button>
  </div>

  <script>
    const tones = {
      lav: ['#d9ccff', '#8f6ee8'],
      mint: ['#8ce1c3', '#26b586'],
      amber: ['#ffd480', '#f5a623'],
    }
    const blob = document.getElementById('blob')
    document.querySelectorAll('button[data-tone]').forEach((button) => {
      button.addEventListener('click', () => {
        const tone = button.dataset.tone
        document.querySelectorAll('button[data-tone]').forEach((b) => b.classList.remove('active'))
        button.classList.add('active')
        if (tone === 'transparent') {
          document.body.classList.toggle('transparent')
          return
        }
        document.body.classList.remove('transparent')
        const [a, b] = tones[tone]
        blob.style.background = `radial-gradient(circle at 35% 30%, ${a} 0%, ${b} 70%)`
      })
    })
  </script>
</body>
</html>
